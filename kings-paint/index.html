<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />

    <!-- Primary SEO -->
    <title>Kings Paint | Premium Quality Paints & Coatings</title>
    <meta
      name="description"
      content="Kings Paint offers premium interior and exterior paints, industrial coatings, waterproof solutions, and decorative finishes. Shop online with secure payments and fast delivery."
    />
    <meta
      name="keywords"
      content="paint store, interior paint, exterior paint, industrial coatings, decorative paint, waterproof paint, buy paint online"
    />
    <meta name="author" content="Kings Paint" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.kingspaint.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/KingsLogo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kings Paint | Premium Paint Solutions" />
    <meta
      property="og:description"
      content="Shop high-quality paints and coatings from Kings Paint. Secure checkout, loyalty rewards, and nationwide delivery."
    />
    <meta property="og:url" content="https://www.kingspaint.com/" />
    <meta property="og:image" content="https://www.kingspaint.com/og-image.jpg" />
    <meta property="og:site_name" content="Kings Paint" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kings Paint | Premium Paint Solutions" />
    <meta
      name="twitter:description"
      content="Buy interior & exterior paints online. Secure payments, loyalty rewards, and fast delivery."
    />
    <meta name="twitter:image" content="https://www.kingspaint.com/og-image.jpg" />

    <!-- Preconnect (Performance Boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (Organization + Ecommerce) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Kings Paint",
        "url": "https://www.kingspaint.com",
        "logo": "https://www.kingspaint.com/logo.png",
        "sameAs": [
          "https://www.facebook.com/kingspaint",
          "https://www.instagram.com/kingspaint"
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Kings Paint Online Store",
        "image": "https://www.kingspaint.com/og-image.jpg",
        "description": "Premium interior and exterior paints with secure online checkout.",
        "brand": {
          "@type": "Brand",
          "name": "Kings Paint"
        },
        "paymentAccepted": ["Cash", "Credit Card", "Mobile Money", "Cryptocurrency"],
        "currenciesAccepted": "GHS"
      }
    </script>
  </head>

  <body>
    <noscript>
      Kings Paint requires JavaScript to function properly. Please enable it
      in your browser settings.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
